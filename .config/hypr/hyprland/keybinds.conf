# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = SUPER, T, exec, sh -c "kitty"
bind = SUPER, B, exec, sh -c "$BROWSER"
bind = SUPER, Q, killactive,
bind = SUPER, M, exit,
bind = SUPER, E, exec, kitty --class Yazi yazi
bind = SUPER, F, fullscreen,
bind = SUPER, W, togglefloating,
bind = SUPER, A, exec, tofi-drun
bind = SUPER, J, layoutmsg, swapsplit
bind = SUPER, K, layoutmsg, togglesplit

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + Shift + [0-9]
bind = SUPER Shift, 1, movetoworkspace, 1
bind = SUPER Shift, 2, movetoworkspace, 2
bind = SUPER Shift, 3, movetoworkspace, 3
bind = SUPER Shift, 4, movetoworkspace, 4
bind = SUPER Shift, 5, movetoworkspace, 5
bind = SUPER Shift, 6, movetoworkspace, 6
bind = SUPER Shift, 7, movetoworkspace, 7
bind = SUPER Shift, 8, movetoworkspace, 8
bind = SUPER Shift, 9, movetoworkspace, 9
bind = SUPER Shift, 0, movetoworkspace, 10

# Move active window to a workspace with mainMod + Shift + [0-9]
bind = SUPER Ctrl, 1, movetoworkspacesilent, 1
bind = SUPER Ctrl, 2, movetoworkspacesilent, 2
bind = SUPER Ctrl, 3, movetoworkspacesilent, 3
bind = SUPER Ctrl, 4, movetoworkspacesilent, 4
bind = SUPER Ctrl, 5, movetoworkspacesilent, 5
bind = SUPER Ctrl, 6, movetoworkspacesilent, 6
bind = SUPER Ctrl, 7, movetoworkspacesilent, 7
bind = SUPER Ctrl, 8, movetoworkspacesilent, 8
bind = SUPER Ctrl, 9, movetoworkspacesilent, 9
bind = SUPER Ctrl, 0, movetoworkspacesilent, 10

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Resize windows
binde = SUPER+Shift, Right, resizeactive, 30 0
binde = SUPER+Shift, Left, resizeactive, -30 0
binde = SUPER+Shift, Up, resizeactive, 0 -30
binde = SUPER+Shift, Down, resizeactive, 0 30

# Screen locking
bind = SUPER, L, exec, hyprlock
bind = SUPER, Escape, exec, sh -c "pgrep wlogout || wlogout"

# waybar
# bind = Ctrl, Escape, exec, killall waybar ; waybar

# Volume and Media Control
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Screen brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%
