# =============================================================================
# Window Rules — Hyprland 0.53+ (Named Rules Format)
# Use hyprctl clients to check current class/title
# =============================================================================

# Obsidian
windowrule {
  name = obsidian-opacity
  match:class = ^obsidian$
  opacity = 0.8 0.8 1.0
}

# Kitty terminal
windowrule {
  name = kitty-opacity
  match:class = ^kitty$
  opacity = 0.8 0.8 1.0
}

# Kvantum Manager
windowrule {
  name = kvantum-manager
  match:class = ^kvantummanager$
  float = on
  opacity = 0.8 0.8 1.0
}

# Blueman Manager
windowrule {
  name = blueman-manager
  match:class = ^blueman-manager$
  float = on
  opacity = 0.8 0.7 1.0
}

# Network Manager Applet
windowrule {
  name = nm-applet
  match:class = ^nm-applet$
  float = on
  opacity = 0.8 0.7 1.0
}

# Network Manager Connection Editor
windowrule {
  name = nm-connection-editor
  match:class = ^nm-connection-editor$
  float = on
  opacity = 0.8 0.7 1.0
}

# Spotify
windowrule {
  name = spotify-opacity-class
  match:class = ^Spotify$
  opacity = 0.7 0.7 1.0
}

windowrule {
  name = spotify-opacity-title
  match:initial_title = ^Spotify Free$
  opacity = 0.7 0.7 1.0
}

# KDE Polkit Authentication Agent
windowrule {
  name = kde-polkit-agent
  match:class = ^org\.kde\.polkit-kde-authentication-agent-1$
  float = on
  opacity = 0.8 0.7 1.0
}

# GNOME Polkit Authentication Agent
windowrule {
  name = gnome-polkit-agent
  match:class = ^polkit-gnome-authentication-agent-1$
  opacity = 0.8 0.7 1.0
}

# GTK Portal
windowrule {
  name = gtk-portal
  match:class = ^org\.freedesktop\.impl\.portal\.desktop\.gtk$
  opacity = 0.8 0.7 1.0
}

# Hyprland Portal
windowrule {
  name = hyprland-portal
  match:class = ^org\.freedesktop\.impl\.portal\.desktop\.hyprland$
  opacity = 0.8 0.7 1.0
}

# Yazi file manager
windowrule {
  name = yazi-floating-setup
  match:class = ^Yazi$
  float = on
  size = 90% 90%
  opacity = 0.8 0.2 1.0
}

# bluetui — Bluetooth TUI
windowrule {
  name = bluetui-floating-setup
  match:class = ^bluetui$
  float = on
  size = 75% 75%
  opacity = 0.8 0.2 1.0
  dim_around = on
  stay_focused = on
}

# wiremix — Audio mixer
windowrule {
  name = wiremix-floating-setup
  match:class = ^wiremix$
  float = on
  size = 90% 50%
  opacity = 0.8 0.2 1.0
  dim_around = on
  stay_focused = on
}

# nmtui — Network manager TUI
windowrule {
  name = nmtui-floating-setup
  match:class = ^nmtui$
  float = on
  size = 50% 50%
  opacity = 0.8 0.2 1.0
  dim_around = on
  stay_focused = on
}

# nwg-look
windowrule {
  name = nwg-look-float
  match:class = ^nwg-look$
  float = on
}

# KDE Ark
windowrule {
  name = kde-ark-float
  match:class = ^org\.kde\.ark$
  float = on
}

# Pavucontrol
windowrule {
  name = pavucontrol-float
  match:class = ^pavucontrol$
  float = on
}

# Uinta Engine - OpenGL game engine window
# Use immediate mode to reduce latency and prevent event queue backup
windowrule {
  name = uinta-engine-immediate
  match:title = ^Uinta Engine.*
  immediate = on
}

